name: ng-ci
# CI for the clean-core rebuild. This workflow exists only on the masterplan-ng
# branch, so main's published CI is unaffected. It runs the node:test suites that
# replace the old bash-in-markdown doctor checks — the rebuild's thesis is that
# logic is testable in CI, not only discoverable at runtime.
on:
  push:
    branches: [masterplan-ng]
  pull_request:
    branches: [masterplan-ng]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node --test test/*.test.mjs
