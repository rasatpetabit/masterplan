name: release-gate

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install jq + pyyaml
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          python3 -m pip install --quiet pyyaml

      - name: Configure git identity (needed by guard-b-smoke fixtures)
        run: |
          git config --global user.email "ci@masterplan.local"
          git config --global user.name "release-gate CI"

      - name: Seed gitignored plugin manifests from README
        run: |
          set -euo pipefail
          readme_version=$(grep -oE 'Current release:[[:space:]]*\*\*v[0-9]+\.[0-9]+\.[0-9]+\*\*' README.md \
            | sed -E 's/.*v([0-9]+\.[0-9]+\.[0-9]+).*/\1/' \
            | head -1)
          if [ -z "${readme_version:-}" ]; then
            echo "FAIL: could not parse 'Current release: **vX.Y.Z**' from README.md" >&2
            exit 2
          fi
          echo "Seeding manifests at version ${readme_version}"
          mkdir -p .claude-plugin .codex-plugin .agents/plugins
          cat > .claude-plugin/plugin.json <<EOF
          {
            "name": "masterplan",
            "version": "${readme_version}",
            "description": "Multi-hour engineering workflow plugin (brainstorm → plan → execute) with durable run bundles, wave dispatch, and asymmetric review.",
            "url": "https://github.com/rasatpetabit/masterplan"
          }
          EOF
          cat > .claude-plugin/marketplace.json <<EOF
          {
            "name": "rasatpetabit-masterplan",
            "version": "${readme_version}",
            "plugins": [
              {
                "name": "masterplan",
                "version": "${readme_version}",
                "source": "."
              }
            ]
          }
          EOF
          cat > .codex-plugin/plugin.json <<EOF
          {
            "name": "masterplan",
            "version": "${readme_version}",
            "description": "Multi-hour engineering workflow plugin (brainstorm → plan → execute) with durable run bundles, wave dispatch, and asymmetric review.",
            "url": "https://github.com/rasatpetabit/masterplan"
          }
          EOF
          cat > .agents/plugins/marketplace.json <<'EOF'
          {
            "name": "rasatpetabit-masterplan",
            "interface": {
              "displayName": "rasatpetabit masterplan"
            },
            "plugins": [
              {
                "name": "masterplan",
                "source": {
                  "source": "local",
                  "path": "./plugins/masterplan"
                },
                "policy": {
                  "installation": "INSTALLED_BY_DEFAULT",
                  "authentication": "ON_INSTALL"
                },
                "category": "Coding"
              }
            ]
          }
          EOF

      - name: Seed user-level plugin registry (suppresses drift-check warnings)
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.claude/plugins"
          cat > "${HOME}/.claude/plugins/installed_plugins.json" <<'EOF'
          {
            "plugins": {
              "masterplan@rasatpetabit-masterplan": {
                "name": "masterplan",
                "marketplace": "rasatpetabit-masterplan"
              }
            }
          }
          EOF

      - name: Run release gate
        run: bash bin/masterplan-release-gate.sh

  release-publish:
    needs: release-gate
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Extract CHANGELOG section for this tag
        id: notes
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          awk -v ver="${version}" '
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture && /^---$/ { exit }
            capture { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "FAIL: no CHANGELOG section found for [${version}]" >&2
            echo "  Expected a '## [${version}] — <date> — <title>' header in CHANGELOG.md before tagging." >&2
            exit 1
          fi
          {
            echo "tag=${tag}"
            echo "version=${version}"
          } >> "${GITHUB_OUTPUT}"
          echo "--- release notes preview ---"
          cat /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.notes.outputs.tag }}" \
            --title "${{ steps.notes.outputs.tag }}" \
            --notes-file /tmp/release-notes.md
