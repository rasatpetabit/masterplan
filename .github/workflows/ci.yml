name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Unit suite
        run: node --test test/*.test.mjs

      - name: Doctor
        run: node bin/doctor.mjs

      - name: Plugin symlink resolves
        run: |
          set -euo pipefail
          [ "$(readlink plugins/masterplan)" = ".." ]
          [ -f plugins/masterplan/commands/masterplan.md ]

  release-publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Extract CHANGELOG section for this tag
        id: notes
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          awk -v ver="${version}" '
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture && /^---$/ { exit }
            capture { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "FAIL: no CHANGELOG section found for [${version}]" >&2
            echo "  Expected a '## [${version}] — <date> — <title>' header in CHANGELOG.md before tagging." >&2
            exit 1
          fi
          {
            echo "tag=${tag}"
            echo "version=${version}"
          } >> "${GITHUB_OUTPUT}"
          echo "--- release notes preview ---"
          cat /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.notes.outputs.tag }}" \
            --title "${{ steps.notes.outputs.tag }}" \
            --notes-file /tmp/release-notes.md
